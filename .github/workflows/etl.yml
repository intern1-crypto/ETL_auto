name: ETL Pipeline

on:
  schedule:
    - cron: "0 3 * * *"   # 12:00 JST
    - cron: "0 6 * * *"   # 15:00 JST
    - cron: "0 9 * * *"   # 18:00 JST
    - cron: "0 12 * * *"  # 21:00 JST
  workflow_dispatch:       # 手動実行も可能

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: |
          mkdir -p credentials
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > credentials/gcp-secret-key.json

      - name: Run ETL
        run: python main.py
